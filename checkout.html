<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | SmartCart</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="top-bar">Free Delivery on Orders Above ₹499 | Mega Deals Live Now</div>

<nav class="navbar navbar-expand-lg navbar-dark main-navbar sticky-top">
<div class="container-fluid px-4">
<a class="navbar-brand fw-bold fs-3" href="index.html"><i class="fa-solid fa-cart-shopping"></i> SmartCart</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarMenu">
<ul class="navbar-nav ms-auto align-items-lg-center">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
<li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
<li class="nav-item"><a class="nav-link" href="cart.html"><i class="fa-solid fa-cart-shopping"></i> Cart <span class="badge bg-warning text-dark">0</span></a></li>
<li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
</ul>
</div>
</div>
</nav>

<section class="checkout-section">
<div class="container">
<h2 class="section-title text-center mb-4">Checkout</h2>

<div class="row g-4">
<div class="col-lg-7">
<div class="checkout-card">
<h4>Delivery Details</h4>

<form id="checkoutForm">
<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" id="checkoutName" placeholder="Enter full name">
<small class="error" id="checkoutNameError"></small>
</div>

<div class="mb-3">
<label class="form-label">Mobile Number</label>
<input type="text" class="form-control" id="checkoutPhone" placeholder="Enter mobile number">
<small class="error" id="checkoutPhoneError"></small>
</div>

<div class="mb-3">
<label class="form-label">Address</label>
<textarea class="form-control" id="checkoutAddress" rows="4" placeholder="Enter delivery address"></textarea>
<small class="error" id="checkoutAddressError"></small>
</div>

<div class="mb-3">
<label class="form-label">Payment Method</label>
<select class="form-select" id="paymentMethod">
<option value="">Select Payment Method</option>
<option>Cash on Delivery</option>
<option>UPI</option>
<option>Credit/Debit Card</option>
</select>
<small class="error" id="paymentError"></small>
</div>

<button type="submit" class="btn btn-warning w-100">Place Order</button>
</form>
</div>
</div>

<div class="col-lg-5">
<div class="checkout-card">
<h4>Order Summary</h4>
<div id="checkoutItems"></div>
<hr>
<div class="summary-row total-row">
<span>Total</span>
<span id="checkoutTotal">₹0</span>
</div>
</div>
</div>
</div>
</div>
</section>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/checkout.js"></script>

</body>
</html>
