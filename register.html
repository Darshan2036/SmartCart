<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | SmartCart</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="top-bar">Free Delivery on Orders Above ₹499 | Mega Deals Live Now</div>

<nav class="navbar navbar-expand-lg navbar-dark main-navbar sticky-top">
<div class="container-fluid px-4">
<a class="navbar-brand fw-bold fs-3" href="index.html"><i class="fa-solid fa-cart-shopping"></i> SmartCart</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarMenu">
<ul class="navbar-nav ms-auto align-items-lg-center">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
<li class="nav-item">
    <a class="nav-link" href="contact.html">Contact</a>
</li>
<li class="nav-item"><a class="nav-link" href="cart.html"><i class="fa-solid fa-cart-shopping"></i> Cart <span class="badge bg-warning text-dark">0</span></a></li>
<li class="nav-item"><a class="nav-link active" href="register.html">Register</a></li>
</ul>
</div>
</div>
</nav>

<section class="auth-section">
<div class="auth-card register-card">
<h2>Create Account</h2>
<p>Join SmartCart and start shopping</p>

<form id="registerForm">
<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" id="regName" placeholder="Enter full name">
<small class="error" id="regNameError"></small>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" id="regEmail" placeholder="Enter email">
<small class="error" id="regEmailError"></small>
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" class="form-control" id="regPassword" placeholder="Enter password">
<small class="error" id="regPasswordError"></small>
</div>

<div class="mb-3">
<label class="form-label">Confirm Password</label>
<input type="password" class="form-control" id="regConfirmPassword" placeholder="Confirm password">
<small class="error" id="regConfirmPasswordError"></small>
</div>

<button type="submit" class="btn btn-warning w-100">Register</button>

<p class="mt-3 text-center">Already have an account? <a href="login.html">Login</a></p>
</form>
</div>
</section>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>

</body>
</html>
