<section class="contact-section">
<div class="container">
<div class="row g-4 align-items-center">

<div class="col-lg-5">
<div class="contact-info">
<h2>Contact Us</h2>
<p>Have questions? We are here to help you.</p>
<p><i class="fa-solid fa-location-dot"></i> Pune, Maharashtra</p>
<p><i class="fa-solid fa-envelope"></i> support@smartcart.com</p>
<p><i class="fa-solid fa-phone"></i> +91 98765 43210</p>
</div>
</div>

<div class="col-lg-7">
<div class="contact-card">
<form id="contactForm">
<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" class="form-control" id="contactName" placeholder="Enter your name">
<small class="error" id="contactNameError"></small>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" id="contactEmail" placeholder="Enter your email">
<small class="error" id="contactEmailError"></small>
</div>

<div class="mb-3">
<label class="form-label">Message</label>
<textarea class="form-control" id="contactMessage" rows="5" placeholder="Enter your message"></textarea>
<small class="error" id="contactMessageError"></small>
</div>

<button type="submit" class="btn btn-warning w-100">Send Message</button>
</form>
</div>
</div>

</div>
</div>
</section>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
